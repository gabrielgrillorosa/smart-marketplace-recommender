services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-marketplace}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-postgres}", "-d", "${POSTGRES_DB:-marketplace}"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5
    container_name: neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password123}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-512m}
      NEO4J_dbms_connector_bolt_thread__pool__max__size: "50"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:-password123}", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  api-service:
    build:
      context: ./api-service
      dockerfile: Dockerfile
    image: smart-marketplace/api-service:latest
    container_name: api-service
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    ports:
      - "${API_SERVICE_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    image: smart-marketplace/ai-service:latest
    container_name: ai-service
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password123}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      PORT: "3001"
      API_SERVICE_URL: http://api-service:8080
      NEURAL_WEIGHT: ${NEURAL_WEIGHT:-0.6}
      SEMANTIC_WEIGHT: ${SEMANTIC_WEIGHT:-0.4}
    ports:
      - "${AI_SERVICE_PORT:-3001}:3001"
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: smart-marketplace/frontend:latest
    container_name: frontend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${API_SERVICE_PORT:-8080}
      NEXT_PUBLIC_AI_URL: http://localhost:${AI_SERVICE_PORT:-3001}
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      - api-service
      - ai-service
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 | grep -q Smart"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
