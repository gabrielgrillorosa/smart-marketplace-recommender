spring.application.name=api-service
server.port=${API_SERVICE_PORT:8080}

# Datasource
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:marketplace}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,caches,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# Cache
spring.cache.type=caffeine

# AI Service
ai.service.base-url=${AI_SERVICE_URL:http://localhost:8000}
ai.service.timeout.connect=1000
ai.service.timeout.response=3000

# Outbox dispatcher
outbox.dispatcher.channel=integration_outbox_new
outbox.dispatcher.batch-size=10
outbox.dispatcher.lease-ms=30000
outbox.dispatcher.retry-delay-ms=5000
outbox.dispatcher.notification-timeout-ms=1000
outbox.dispatcher.reconnect-delay-ms=1000
outbox.dispatcher.sweep-delay-ms=120000
outbox.dispatcher.sweep-initial-delay-ms=120000

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.aiServiceRecommend.sliding-window-size=10
resilience4j.circuitbreaker.instances.aiServiceRecommend.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.aiServiceRecommend.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.aiServiceRecommend.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.aiServiceRecommend.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.aiServiceRecommend.register-health-indicator=true
resilience4j.circuitbreaker.instances.aiServiceRecommendFromCart.sliding-window-size=10
resilience4j.circuitbreaker.instances.aiServiceRecommendFromCart.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.aiServiceRecommendFromCart.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.aiServiceRecommendFromCart.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.aiServiceRecommendFromCart.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.aiServiceRecommendFromCart.register-health-indicator=true

# SpringDoc
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# M20 / ADR-067 — must match ai-service CHECKOUT_ENQUEUE_TRAINING (default: no train on checkout)
training.checkout.enqueue=${CHECKOUT_ENQUEUE_TRAINING:false}

