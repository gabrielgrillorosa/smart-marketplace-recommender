spring.application.name=api-service
server.port=${API_SERVICE_PORT:8080}

# Datasource
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:marketplace}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,caches,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# Cache
spring.cache.type=caffeine

# AI Service
ai.service.base-url=${AI_SERVICE_URL:http://localhost:8000}
ai.service.timeout.connect=1000
ai.service.timeout.response=3000

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.aiService.sliding-window-size=10
resilience4j.circuitbreaker.instances.aiService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.aiService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.aiService.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.aiService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.aiService.register-health-indicator=true

# SpringDoc
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.config=classpath:logback-spring.xml
